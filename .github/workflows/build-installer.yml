name: Build Installer

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-installer:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore SafeExamBrowser.sln

      - name: Build x64 dependencies
        shell: pwsh
        run: |
          $projects = @(
            'SafeExamBrowser.Client\SafeExamBrowser.Client.csproj',
            'SafeExamBrowser.Runtime\SafeExamBrowser.Runtime.csproj',
            'SafeExamBrowser.ResetUtility\SafeExamBrowser.ResetUtility.csproj',
            'SafeExamBrowser.Service\SafeExamBrowser.Service.csproj',
            'SebWindowsConfig\SebWindowsConfig.csproj'
          )

          foreach ($project in $projects) {
            msbuild $project /m /p:Configuration=Release /p:Platform=x64 /p:langversion=latest
          }

      - name: Build x64 setup MSI
        shell: pwsh
        run: |
          $repoRoot = "$env:GITHUB_WORKSPACE\"
          msbuild Setup\Setup.wixproj /m /p:Configuration=Release /p:Platform=x64 /p:SignOutput=false /p:BuildProjectReferences=false /p:RepoRoot="$repoRoot"

      - name: Build x86 dependencies
        shell: pwsh
        run: |
          $projects = @(
            'SafeExamBrowser.Client\SafeExamBrowser.Client.csproj',
            'SafeExamBrowser.Runtime\SafeExamBrowser.Runtime.csproj',
            'SafeExamBrowser.ResetUtility\SafeExamBrowser.ResetUtility.csproj',
            'SafeExamBrowser.Service\SafeExamBrowser.Service.csproj',
            'SebWindowsConfig\SebWindowsConfig.csproj'
          )

          foreach ($project in $projects) {
            msbuild $project /m /p:Configuration=Release /p:Platform=x86 /p:langversion=latest
          }

      - name: Build x86 setup MSI
        shell: pwsh
        run: |
          $repoRoot = "$env:GITHUB_WORKSPACE\"
          msbuild Setup\Setup.wixproj /m /p:Configuration=Release /p:Platform=x86 /p:SignOutput=false /p:BuildProjectReferences=false /p:RepoRoot="$repoRoot"

      - name: Build x86 setup bundle
        shell: pwsh
        run: |
          $repoRoot = "$env:GITHUB_WORKSPACE\"
          msbuild SetupBundle\SetupBundle.wixproj /m /p:Configuration=Release /p:Platform=x86 /p:SignOutput=false /p:BuildProjectReferences=false /p:RepoRoot="$repoRoot"

      - name: Upload MSI and bundle
        uses: actions/upload-artifact@v4
        with:
          name: seb-installers
          path: |
            Setup\bin\x64\Release\Setup.msi
            Setup\bin\x86\Release\Setup.msi
            SetupBundle\bin\x86\Release\SetupBundle.exe