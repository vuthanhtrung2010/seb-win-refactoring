name: Build Installer

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-installer:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore SafeExamBrowser.sln

      - name: Build x64 installer
        shell: pwsh
        run: |
          msbuild SafeExamBrowser.sln /m /p:Configuration=Release /p:Platform=x64 /p:langversion=latest /p:SignOutput=false

      - name: Build x86 installer and bundle
        shell: pwsh
        run: |
          msbuild SafeExamBrowser.sln /m /p:Configuration=Release /p:Platform=x86 /p:langversion=latest /p:SignOutput=false

      - name: Upload MSI and bundle
        uses: actions/upload-artifact@v4
        with:
          name: seb-installers
          path: |
            Setup\bin\x64\Release\Setup.msi
            Setup\bin\x86\Release\Setup.msi
            SetupBundle\bin\x86\Release\SetupBundle.exe